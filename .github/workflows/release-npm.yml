name: Release npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.0.1-alpha.7)'
        required: true
      tag:
        description: 'npm dist-tag (alpha, latest)'
        required: true
        default: 'alpha'

env:
  CARGO_INCREMENTAL: '0'
  PKG_DIR: bindings/typescript/delta-db

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            host: macos-latest
          - target: aarch64-apple-darwin
            host: macos-latest
          - target: x86_64-unknown-linux-gnu
            host: ubuntu-latest
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian
          - target: aarch64-unknown-linux-gnu
            host: ubuntu-latest
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-aarch64

    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.host }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup node
        if: ${{ !matrix.docker }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        if: ${{ !matrix.docker }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        working-directory: ${{ env.PKG_DIR }}
        run: npm install

      # macOS builds
      - name: Build (macOS)
        if: startsWith(matrix.host, 'macos')
        working-directory: ${{ env.PKG_DIR }}
        run: npx napi build --cargo-cwd ../../.. --features napi --release --platform --target ${{ matrix.target }} --dts native.d.ts --js false src

      # Linux builds in Docker
      - name: Build (Linux docker)
        if: matrix.docker
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.docker }}
          options: '--user 0:0 -v ${{ github.workspace }}:/build -w /build/${{ env.PKG_DIR }}'
          run: |
            npm install
            npx napi build --cargo-cwd ../../.. --features napi --release --platform --target ${{ matrix.target }} --dts native.d.ts --js false src

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: ${{ env.PKG_DIR }}/src/delta-db.*.node
          if-no-files-found: error

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: ${{ env.PKG_DIR }}
        run: npm install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.PKG_DIR }}/artifacts

      - name: Move .node files into src/
        working-directory: ${{ env.PKG_DIR }}
        run: |
          for dir in artifacts/bindings-*/; do
            cp "$dir"/*.node src/
          done
          echo "=== .node files ==="
          ls -lh src/*.node

      - name: Set version
        working-directory: ${{ env.PKG_DIR }}
        run: npm version ${{ inputs.version }} --no-git-tag-version --allow-same-version

      - name: Publish
        working-directory: ${{ env.PKG_DIR }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --tag ${{ inputs.tag }}
